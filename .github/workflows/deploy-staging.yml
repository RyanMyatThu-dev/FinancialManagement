name: Deploy to Staging (AWS Lambda)

on:
  push:
    branches:
      - staging

permissions:
  id-token: write # Required for requesting the JWT OIDC token from AWS
  contents: read  # Required to checkout repository content

jobs:
  build-test-deploy:
    name: Build, Test & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
    # 1. Checkout the repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup .NET 8.0 SDK
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # 3. Restore dependencies & Run Unit Tests
    - name: Restore & Test
      run: |
        dotnet restore
        dotnet test --no-restore --verbosity normal

    # 4. Install AWS Lambda Global CLI Tooling
    - name: Install AWS Lambda Tools
      run: dotnet tool install -g Amazon.Lambda.Tools

    # 5. Configure AWS Credentials using Secure OIDC (No permanent keys)
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
        aws-region: ap-southeast-1
        audience: sts.amazonaws.com

    # 6. Deploy to Staging Lambda Stack
    - name: Deploy API to Staging Lambda
      run: |
        cd ST_finance.Api
        dotnet lambda deploy-serverless \
          --stack-name st-finance-staging-stack \
          --s3-bucket ${{ secrets.AWS_DEPLOYMENT_S3_BUCKET || vars.AWS_DEPLOYMENT_S3_BUCKET }}

